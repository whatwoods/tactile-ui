<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Base Plate Shadow -->
    <filter id="plate-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.1"/>
    </filter>

    <!-- Dial Knob Shadow -->
    <filter id="knob-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

    <!-- LED & Active Tick Glow (Blue) -->
    <filter id="blue-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#6085f7" flood-opacity="0.85"/>
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bezel Metal Edge -->
    <linearGradient id="bezel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#dedede"/>
      <stop offset="50%" stop-color="#9f9f9f"/>
      <stop offset="75%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>

    <!-- Plate Surface Ribbed Texture Pattern -->
    <pattern id="ribs" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="3" height="6" fill="#fdfdfd"/>
      <rect x="3" width="3" height="6" fill="#fafafa"/>
    </pattern>

    <!-- Base Plate Vertical Gradient Overlay (gives curvature) -->
    <linearGradient id="plate-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8e8e8" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Dial Knob radial metal chrome gradient -->
    <radialGradient id="knob-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ededed"/>
      <stop offset="70%" stop-color="#d4d4d4"/>
      <stop offset="100%" stop-color="#a6a6a6"/>
    </radialGradient>

    <!-- LED Glowing Light Blue -->
    <radialGradient id="led-blue" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a2beff"/>
      <stop offset="60%" stop-color="#6085f7"/>
      <stop offset="100%" stop-color="#3b5cb8"/>
    </radialGradient>

    <!-- Diagonal Glare Highlight -->
    <linearGradient id="plate-glare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="42.1%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 1. Base Plate Panel -->
  <rect x="8" y="8" width="112" height="112" rx="20" fill="url(#ribs)" filter="url(#plate-shadow)" stroke="#c5c5c5" stroke-width="1.2" />
  <!-- Curve shading overlay -->
  <rect x="8" y="8" width="112" height="112" rx="20" fill="url(#plate-grad)" pointer-events="none" />
  <!-- Diagonal Glare -->
  <rect x="8" y="8" width="112" height="112" rx="20" fill="url(#plate-glare)" pointer-events="none" />

  <!-- Inner Plate highlights for 3D bezel edge -->
  <rect x="9.2" y="9.2" width="109.6" height="109.6" rx="18.8" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.7" pointer-events="none" />

  <!-- 2. Engraved S-UI Branding (Top-Left) -->
  <text x="22.5" y="30.5" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="11.5" font-weight="900" fill="#ffffff" opacity="0.85" letter-spacing="0.5">S-UI</text>
  <text x="22" y="30" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="11.5" font-weight="900" fill="#757575" letter-spacing="0.5">S-UI</text>

  <!-- 3. Glowing LED Indicator (Top-Right) -->
  <circle cx="102" cy="25" r="7" fill="#dfdfdf" stroke="#b0b0b0" stroke-width="0.8" />
  <circle cx="102" cy="25" r="5.5" fill="url(#led-blue)" filter="url(#blue-glow)" />
  <circle cx="100.5" cy="23.5" r="1.5" fill="#ffffff" opacity="0.6" />

  <!-- 4. Dial Outer Circular Scale/Ticks (Mode indicators) -->
  <!-- Inactive dots -->
  <circle cx="24.2" cy="93" r="2.5" fill="#d4d4d4" stroke="#ffffff" stroke-width="0.5" />
  <circle cx="24.2" cy="47" r="2.5" fill="#d4d4d4" stroke="#ffffff" stroke-width="0.5" />
  <circle cx="103.8" cy="47" r="2.5" fill="#d4d4d4" stroke="#ffffff" stroke-width="0.5" />
  <circle cx="103.8" cy="93" r="2.5" fill="#d4d4d4" stroke="#ffffff" stroke-width="0.5" />
  <!-- Active dot (glowing blue) at top center -->
  <circle cx="64" cy="24" r="3.2" fill="url(#led-blue)" filter="url(#blue-glow)" />

  <!-- 5. Knob Recessed Inner Groove -->
  <circle cx="64" cy="70" r="37.5" fill="#e3e3e3" stroke="#b8b8b8" stroke-width="1.2" />
  <circle cx="64" cy="70" r="36.5" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.8" />

  <!-- 6. Metal Rotary Dial Knob -->
  <g filter="url(#knob-shadow)">
    <circle cx="64" cy="70" r="32.5" fill="url(#knob-grad)" />
    <!-- Bezel ring -->
    <circle cx="64" cy="70" r="32.5" fill="none" stroke="url(#bezel-grad)" stroke-width="1.2" />
    <circle cx="64" cy="70" r="31.7" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.5" />
  </g>

  <!-- Knob dimple/notch rotated (pointing at active dot, -30 deg or 0 deg, let's keep it pointing at 0 deg top-center or slightly rotated for dynamism: -15 deg) -->
  <g transform="rotate(-15, 64, 70)">
    <!-- Notch shadow -->
    <rect x="62.5" y="42" width="3" height="11" rx="1.5" fill="#808080" opacity="0.6" transform="translate(0.5, 0.5)" />
    <!-- Notch body -->
    <rect x="62.5" y="42" width="3" height="11" rx="1.5" fill="#3a3a3a" />
    <!-- Specular line inside notch -->
    <rect x="63" y="42.5" width="1" height="10" rx="0.5" fill="#ffffff" opacity="0.35" />
  </g>
</svg>