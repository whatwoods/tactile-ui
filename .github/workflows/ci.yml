name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Visual smoke
        run: npm run test:visual

      - name: Runtime audit
        run: npm run audit:runtime

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm run pack:check
